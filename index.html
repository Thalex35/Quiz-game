<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz interactif</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>
<div class="card">

  <!-- Écran accueil -->
  <div class="screen active" id="screen-home">
    <h1>Quiz interactif</h1>
    <p class="sub">Choisissez une catégorie et testez vos connaissances.</p>

    <div class="cat-grid" id="cat-grid"></div>

    <div class="ctrl-row">
      <label for="qcount">Nombre de questions</label>
      <input type="range" id="qcount" min="3" max="10" step="1" value="5"
             oninput="document.getElementById('qcount-out').textContent = this.value" />
      <span class="val" id="qcount-out">5</span>
    </div>
    <div class="ctrl-row">
      <label for="tcount">Temps par question</label>
      <input type="range" id="tcount" min="5" max="30" step="5" value="15"
             oninput="document.getElementById('tcount-out').textContent = this.value + 's'" />
      <span class="val" id="tcount-out">15s</span>
    </div>

    <button class="primary" id="start-btn" onclick="startQuiz()" disabled>Commencer le quiz</button>
  </div>

  <!-- Écran question -->
  <div class="screen" id="screen-question">
    <div class="q-meta">
      <span class="pill pill-blue" id="q-cat-label"></span>
      <span class="q-progress-text" id="q-progress"></span>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    <p id="q-text"></p>
    <div id="options-container"></div>
    <div class="feedback" id="feedback-box"></div>
    <button id="next-btn" type="button" onclick="nextQuestion()">Question suivante →</button>
  </div>

  <!-- Écran résultats -->
  <div class="screen" id="screen-results">
    <h2>Résultats</h2>
    <p class="sub" id="result-comment"></p>

    <div class="metric-row">
      <div class="metric"><div class="metric-val" id="r-score">0</div><div class="metric-lbl">Score</div></div>
      <div class="metric"><div class="metric-val" id="r-pct">0%</div><div class="metric-lbl">Réussite</div></div>
      <div class="metric"><div class="metric-val" id="r-time">—</div><div class="metric-lbl">Temps moy.</div></div>
    </div>

    <p style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;">Détail des réponses</p>
    <div id="history-list"></div>

    <div class="btn-row">
      <button class="primary" onclick="restartSame()">Rejouer</button>
      <button onclick="goHome()">Changer de catégorie</button>
    </div>
  </div>

</div>


</body>
</html>
